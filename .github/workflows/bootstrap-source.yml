name: Bootstrap application source

on:
  push:
    branches: [main]
    paths:
      - source-bundle.b64

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Extract validated source bundle
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode source-bundle.b64 | tar -xzf -
          rm -f source-bundle.b64
          rm -f .github/workflows/bootstrap-source.yml
      - name: Commit application source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implementa Évora Gestão v1.0"
          git push
