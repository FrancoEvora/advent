<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Évora Gestão</title><style>body{margin:0;background:#f3f6f4;color:#17231f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr}.hero{padding:7vw;color:white;background:linear-gradient(145deg,#082a22,#0d3f32);display:flex;flex-direction:column;justify-content:space-between}.hero h1{font:700 clamp(42px,6vw,76px)/1 Georgia,serif}.brand{display:flex;align-items:center;gap:12px}.brand i{width:44px;height:44px;display:grid;place-items:center;border-radius:12px;background:#c59b4b;color:#082a22;font:700 24px Georgia,serif}.card{width:min(440px,calc(100% - 40px));margin:auto;padding:34px;border:1px solid #dde5e1;border-radius:22px;background:white;box-shadow:0 20px 60px #082a2214}.card h2{font:700 38px Georgia,serif;color:#0d3f32}.card label{display:grid;gap:7px;margin:14px 0;font-size:13px;font-weight:700}.card input{width:100%;padding:13px;border:1px solid #ccd8d2;border-radius:10px;box-sizing:border-box}.card button{width:100%;padding:13px;border:0;border-radius:10px;font-weight:800}.primary{background:#0d3f32;color:white}.link{background:white;color:#0d3f32}.message{min-height:20px;color:#8d3333}[hidden]{display:none!important}@media(max-width:850px){.wrap{grid-template-columns:1fr}.hero{min-height:35vh;padding:35px}.card{margin:28px auto}}</style></head><body><main id="auth" class="wrap"><section class="hero"><div class="brand"><i>É</i><strong>Évora Gestão</strong></div><div><p>ÉVORA URBANISMO</p><h1>Controle para decidir.<br>Visão para crescer.</h1><span>Gestão financeira segura para desktop e smartphone.</span></div></section><form id="form" class="card"><small>ACESSO ADMINISTRATIVO</small><h2 id="title">Bem-vindo</h2><p>Entre com suas credenciais da Évora.</p><label id="nameRow" hidden>Nome completo<input id="name"></label><label>E-mail<input id="email" type="email" required></label><label>Senha<input id="password" type="password" minlength="8" required></label><div id="message" class="message"></div><button id="submit" class="primary">Entrar</button><button id="toggle" type="button" class="link">Criar primeiro acesso</button></form></main><div id="app" hidden><button id="logout">Sair</button><span id="userEmail"></span><strong id="balance"></strong><strong id="incoming"></strong><strong id="outgoing"></strong><div id="appMessage"></div><form id="entryForm"><select name="type"><option value="entrada">Entrada</option><option value="saida">Saída</option></select><input name="description"><input name="category"><input name="amount" type="number"><input name="due_date" type="date"><button>Salvar</button></form><div id="entries"></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/gh/FrancoEvora/advent@main/public/login.js"></script></body></html>
