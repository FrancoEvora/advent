name: Finalize application source

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  unpack:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Extract source bundle
        shell: bash
        run: |
          set -euo pipefail
          test -f source-bundle.b64
          base64 --decode source-bundle.b64 | tar -xzf -
      - name: Install and validate
        shell: bash
        run: |
          set -euo pipefail
          test -f package.json
          test -f src/app/page.tsx
          test -f src/app/globals.css
          npm install --no-audit --no-fund
          npm run lint
          npm run build
      - name: Clean temporary files and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f source-bundle.b64
          rm -f .github/workflows/bootstrap-source.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Conclui Évora Gestão v1.0"
          git push
